version: '3.8'

services:
  # V10 Sentinel API
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: always

  # Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Redis (Queue & Cache এর জন্য)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
