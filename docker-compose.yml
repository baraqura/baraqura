version: '2.2'  # Cloud Shell এবং সব ভার্সনের জন্য স্ট্যাবল
services:
  # V10 Sentinel API (Main Application)
  api:
    build: .
    ports:
      - "8080:8080" # Cloud Shell এ প্রিভিউ দেখার জন্য ৮০৮০ জরুরি
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: always

  # Database (MongoDB - Persistent Storage)
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Redis (Queue, Cache & Distributed Intelligence)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
